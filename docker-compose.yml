services:
  postgres:
    image: postgres:17
    container_name: seo-postgres
    environment:
      POSTGRES_USER: qmin
      POSTGRES_PASSWORD: qkqh1771!
      POSTGRES_DB: seo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: seo-redis
    ports:
      - "6379:6379"
volumes:
  postgres_data: